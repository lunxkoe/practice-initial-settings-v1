services:
  mysql:
    image: mysql:8.0
    container_name: closet-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: closet_dev_db
      MYSQL_USER: closet_user
      MYSQL_PASSWORD: closet_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
