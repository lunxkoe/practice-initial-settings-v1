spring:
  application:
    name: practice-initial-settings-v1

logging:
  level:
    root: info
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/closet_dev_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: closet_user
    password: closet_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30       # 기본값(10)에서 상향. 가상 스레드 동시 I/O 처리 대비
      minimum-idle: 10
      connection-timeout: 5000    # 커넥션 획득 대기 시간 (5초)
      max-lifetime: 1800000       # 30분. DB의 커넥션 타임아웃보다 짧게 설정

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    lunxkoe.practiceinitialsettingsv1: debug
#    org.hibernate.SQL: debug
#    org.hibernate.orm.jdbc.bind: trace

decorator:
  datasource:
    p6spy:
      enable-logging: true # P6Spy 활성화 (기본값이 true라 생략해도 됨)
      multiline: true

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    lunxkoe.practiceinitialsettingsv1: info

decorator:
  datasource:
    p6spy:
      enable-logging: false
