spring:
  application:
    name: practice-initial-settings-v1

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    lunxkoe.practice: debug

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
