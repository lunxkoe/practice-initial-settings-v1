spring:
  application:
    name: practice-initial-settings-v1

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    lunxkoe.practiceinitialsettingsv1: debug
#    org.hibernate.SQL: debug
#    org.hibernate.orm.jdbc.bind: trace

#decorator:
#  datasource:
#    p6spy:
#      enable-logging: true # P6Spy 활성화 (기본값이 true라 생략해도 됨)
#      multiline: true

jwt:
  secret: practice-initial-settings-v1-secret-key-must-be-at-least-32-bytes-long # 최소 32바이트 이상
  access-token-validity-in-seconds: 3600      # 1시간
  refresh-token-validity-in-seconds: 604800   # 7일
